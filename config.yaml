# Hand-maintained config. Prefer market URLs; IDs resolve automatically at startup.
defaults:
  min_size: 20
  fallback_v: 0.045
  quote_side: both
  spread_factor: 0.6
  refresh_interval_ms: 120000
  drift_threshold_factor: 0.25
  ws_host: wss://ws-subscriptions-clob.polymarket.com/ws/market
  ws_user_host: wss://ws-subscriptions-clob.polymarket.com/ws/user
  fill_poll_interval_ms: 3000

scan:
  market_count: 5 # null = run all matched markets

